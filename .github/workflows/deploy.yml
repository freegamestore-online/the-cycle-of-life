name: Deploy to R2

# Path B hosting: builds the game on every push to main and uploads web/dist/
# to the fgs-games R2 bucket at games/<repo>/. The freegamestore-host Worker
# on *.freegamestore.online reads this prefix to serve the game — no per-game
# CF Pages project needed (avoids the 100-projects/account CF cap).
#
# Org-level secrets required (set once on the freegamestore-online GitHub org):
#   - R2_ACCESS_KEY_ID
#   - R2_SECRET_ACCESS_KEY
#   - R2_ACCOUNT_ID

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  # Compliance GATE: deploy only runs if this passes. Games are untrusted user
  # content; these block the unambiguous policy violations (external scripts,
  # tracking SDKs) before anything reaches R2. Runtime egress is further
  # constrained by the freegamestore-host CSP.
  compliance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: No external <script src> (games must be self-contained)
        run: |
          if grep -rhiE '<script[^>]*src=[^>]*https?://' web/*.html 2>/dev/null \
             | grep -viE 'freegamestore\.online|cloudflareinsights\.com|googletagmanager\.com|plausible\.io'; then
            echo "::error::external <script src> is not allowed in a published game"; exit 1
          fi
      - name: No tracking SDKs in source
        run: |
          if grep -rE 'google-analytics|gtag\(|amplitude|mixpanel|segment|hotjar|plausible|posthog' web/src/ 2>/dev/null; then
            echo "::error::tracking SDK found in web/src — analytics is platform-provided"; exit 1
          fi

  deploy:
    needs: compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -d ./web/dist || { echo "::error::No build output at web/dist"; exit 1; }
          test -n "$(ls -A ./web/dist)" || { echo "::error::web/dist is empty"; exit 1; }

      # Stamp deploy metadata so the live game answers "what version / when
      # deployed" at <game>.freegamestore.online/version.json. Written into
      # web/dist BEFORE the sync so it ships to R2. The host serves *.json with
      # a short/no-cache TTL so this never reads stale.
      - name: Stamp version.json
        run: |
          cat > web/dist/version.json <<JSON
          {
            "repo": "${GITHUB_REPOSITORY##*/}",
            "commit": "${GITHUB_SHA}",
            "shortCommit": "${GITHUB_SHA::7}",
            "version": "${GITHUB_SHA::7}",
            "source": "build-stamp",
            "ref": "${GITHUB_REF_NAME}",
            "runNumber": ${GITHUB_RUN_NUMBER},
            "runId": "${GITHUB_RUN_ID}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON
          echo "version.json:"; cat web/dist/version.json

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          aws s3 sync ./web/dist "s3://fgs-games/games/${GITHUB_REPOSITORY##*/}/" \
            --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com" \
            --delete \
            --no-progress
          echo "Deployed games/${GITHUB_REPOSITORY##*/} from ${GITHUB_SHA::7}"
